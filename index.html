<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AR Diorama Centerpiece</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const userFaceUrl = urlParams.get('face');

      // 1. The Cloudinary Injector
      AFRAME.registerComponent('center-popup', {
        init: function () {
          if (userFaceUrl) {
            this.el.setAttribute('crossOrigin', 'anonymous');
            this.el.setAttribute('src', userFaceUrl);
          }
        }
      });

      // 2. THE NEW SMART "FLY-IN" ANIMATION
      AFRAME.registerComponent('fly-in', {
        schema: {
          delay: { type: 'number', default: 0 } // Allows us to stagger the animations
        },
        init: function () {
          // Save the exact final position you designed
          this.basePos = { ...this.el.getAttribute('position') };
          
          // Wait for the AR camera to find the image target
          const target = this.el.closest('[mindar-image-target]');
          if (target) {
            target.addEventListener('targetFound', () => {
              // Drop the item 2 meters down...
              const startY = this.basePos.y - 2;
              
              // ...and fire it up into place with a bouncy elastic easing!
              this.el.setAttribute('animation', {
                property: 'position',
                from: `${this.basePos.x} ${startY} ${this.basePos.z}`,
                to: `${this.basePos.x} ${this.basePos.y} ${this.basePos.z}`,
                dur: 1500, // 1.5 seconds long
                easing: 'easeOutElastic',
                delay: this.data.delay
              });
            });
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="backdrop-png" src="./Backdrop.png" />
        <img id="ground-png" src="./Ground.png" />
        <img id="booth-png" src="./Booth.png" />
        <img id="stand-png" src="./Stand.png" />
        <img id="robot-png" src="./Robot.png" />
        
        <img id="particle-png" src="./Particle.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image fly-in="delay: 0" src="#backdrop-png" position="0 0.2 -0.5" height="2" width="2.5" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image fly-in="delay: 100" src="#ground-png" position="0 -0.8 0.5" rotation="-90 0 0" height="2" width="2.5" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image fly-in="delay: 300" src="#booth-png" position="0 -0.2 -0.3" height="1.2" width="1.5" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image fly-in="delay: 450" src="#stand-png" position="0 -0.5 -0.1" height="0.6" width="0.8" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image fly-in="delay: 600" center-popup position="0 -0.1 0.1" height="1.4" width="1.0" material="transparent: true; alphaTest: 0.5"></a-image>
        
        <a-image fly-in="delay: 750" src="#robot-png" position="-0.4 -0.3 0.3" height="1.0" width="0.8" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image fly-in="delay: 900" src="#particle-png" position="-0.6 0.7 -0.3" height="0.1" width="0.1" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image fly-in="delay: 950" src="#particle-png" position="0.5 0.8 -0.2" height="0.08" width="0.08" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image fly-in="delay: 920" src="#particle-png" position="0.7 0.2 -0.1" height="0.12" width="0.12" material="transparent: true; alphaTest: 0.5"></a-image>
        
        <a-image fly-in="delay: 1000" src="#particle-png" position="-0.8 0.1 0.1" height="0.15" width="0.15" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image fly-in="delay: 1050" src="#particle-png" position="0.45 -0.1 0.2" height="0.1" width="0.1" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image fly-in="delay: 1100" src="#particle-png" position="-0.3 0.9 0.5" height="0.25" width="0.25" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image fly-in="delay: 1150" src="#particle-png" position="0.6 -0.3 0.6" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image fly-in="delay: 1200" src="#particle-png" position="-0.1 -0.1 0.7" height="0.3" width="0.3" material="transparent: true; alphaTest: 0.5"></a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
