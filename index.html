<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AR Diorama Centerpiece</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const userFaceUrl = urlParams.get('face');

      AFRAME.registerComponent('center-popup', {
        init: function () {
          if (userFaceUrl) {
            this.el.setAttribute('crossOrigin', 'anonymous');
            this.el.setAttribute('src', userFaceUrl);
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="ground-png" src="./ground.png" />
        
        <img id="cloud1-png" src="./cloud1.png" />
        <img id="cloud2-png" src="./cloud2.png" />
        <img id="cloud3-png" src="./cloud3.png" />
        
        <img id="tree1-png" src="./tree1.png" />
        <img id="tree2-png" src="./tree2.png" />
        <img id="tree3-png" src="./tree3.png" />
        
        <img id="bush1-png" src="./bush1.png" />
        <img id="bush2-png" src="./bush2.png" />
        <img id="stump1-png" src="./stump1.png" />
        <img id="stump2-png" src="./stump2.png" />
        
        <img id="grass1-png" src="./grass1.png" />
        <img id="grass2-png" src="./grass2.png" />
        <img id="grass3-png" src="./grass3.png" />
        <img id="grass4-png" src="./grass4.png" />
        <img id="flower1-png" src="./flower1.png" />
        <img id="flower2-png" src="./flower2.png" />
        <img id="flower3-png" src="./flower3.png" />
        <img id="flower4-png" src="./flower4.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image src="#cloud1-png" position="-0.7 0.8 -0.5" height="0.3" width="0.6" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#cloud2-png" position="0.6 0.9 -0.4" height="0.25" width="0.5" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#cloud3-png" position="0.1 0.7 -0.6" height="0.2" width="0.4" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#tree1-png" position="-0.6 0.1 -0.4" height="1.0" width="0.8" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#tree2-png" position="0.6 0.2 -0.45" height="1.2" width="0.9" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#tree3-png" position="0.0 0.15 -0.5" height="1.1" width="0.8" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#ground-png" position="0 -0.4 0" rotation="-90 0 0" width="2.2" height="2.2" material="transparent: true; alphaTest: 0.5"></a-image>
        
        <a-image center-popup position="0 0.3 0.1" height="1.4" width="1.0" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#stump1-png" position="-0.45 -0.3 0.0" height="0.2" width="0.25" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#stump2-png" position="0.5 -0.25 0.05" height="0.3" width="0.3" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#bush1-png" position="-0.7 -0.25 0.2" height="0.3" width="0.3" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#bush2-png" position="0.65 -0.2 0.25" height="0.4" width="0.4" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#grass1-png" position="-0.5 -0.3 0.4" height="0.2" width="0.25" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#grass2-png" position="0.4 -0.3 0.45" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#grass3-png" position="0.0 -0.3 0.5" height="0.2" width="0.25" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#grass4-png" position="-0.25 -0.3 0.6" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#flower1-png" position="0.25 -0.3 0.4" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#flower2-png" position="-0.45 -0.3 0.55" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#flower3-png" position="0.4 -0.3 0.6" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#flower4-png" position="0.1 -0.3 0.65" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
