<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AR Diorama Centerpiece</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const userFaceUrl = urlParams.get('face');

      AFRAME.registerComponent('center-popup', {
        init: function () {
          if (userFaceUrl) {
            this.el.setAttribute('crossOrigin', 'anonymous');
            this.el.setAttribute('src', userFaceUrl);
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="bg-png" src="./Background.png" />
        <img id="platform-png" src="./Platform.png" />
        <img id="bot-png" src="./Bot.png" />
        <img id="particle-png" src="./Particle.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image src="#bg-png" position="0 0.2 -0.5" height="2.0" width="2.5" material="transparent: true; alphaTest: 0.5"></a-image>
        
        <a-image src="#bg-png" position="0 -0.8 0.5" rotation="-90 0 0" height="2.0" width="2.5" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#platform-png" position="0 -0.4 0.1" rotation="-90 0 0" height="1.2" width="1.2" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image center-popup position="0 0.3 0.1" height="1.4" width="1.0" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#bot-png" position="-0.45 0.1 0.2" height="1.0" width="0.8" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#particle-png" position="-0.6 0.7 -0.3" height="0.1" width="0.1" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#particle-png" position="0.5 0.8 -0.2" height="0.08" width="0.08" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#particle-png" position="0.7 0.2 -0.1" height="0.12" width="0.12" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#particle-png" position="-0.8 0.1 0.1" height="0.15" width="0.15" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#particle-png" position="0.45 -0.1 0.2" height="0.1" width="0.1" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-image src="#particle-png" position="-0.3 0.9 0.5" height="0.25" width="0.25" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#particle-png" position="0.6 -0.3 0.6" height="0.2" width="0.2" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image src="#particle-png" position="-0.1 -0.1 0.7" height="0.3" width="0.3" material="transparent: true; alphaTest: 0.5"></a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
