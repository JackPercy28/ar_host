<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      // 1. Grab the Cloudinary image link from the web address
      const urlParams = new URLSearchParams(window.location.search);
      const userFaceUrl = urlParams.get('face');

      // 2. Inject that image into the 3D scene when it loads
      AFRAME.registerComponent('dynamic-face', {
        init: function () {
          if (userFaceUrl) {
            // Add crossOrigin to prevent security errors from Cloudinary
            this.el.setAttribute('crossOrigin', 'anonymous');
            this.el.setAttribute('src', userFaceUrl);
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="floating-model" src="./FastRun.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane dynamic-face position="0 0 0" height="1.25" width="1" rotation="0 0 0"></a-plane>
        
        <a-gltf-model 
            src="#floating-model" 
            position=".5 -1 0.5" 
            scale="0.06 0.06 0.06" 
            rotation="0 -25 0"
            animation-mixer="clip: mixamo.com.001; loop: repeat;">
        </a-gltf-model>

      </a-entity>
    </a-scene>
  </body>
</html>
