<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI AR Diorama Centerpiece</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const userFaceUrl = urlParams.get('face');

      AFRAME.registerComponent('center-popup', {
        init: function () {
          if (userFaceUrl) {
            this.el.setAttribute('crossOrigin', 'anonymous');
            this.el.setAttribute('src', userFaceUrl);
          }
        }
      });

      AFRAME.registerComponent('scale-in', {
        schema: { delay: { type: 'number', default: 0 } },
        init: function () {
          this.baseScale = { ...this.el.getAttribute('scale') };
          const target = this.el.closest('[mindar-image-target]');
          if (target) {
            target.addEventListener('targetFound', () => {
              this.el.setAttribute('animation', {
                property: 'scale',
                from: `0.001 0.001 0.001`,
                to: `${this.baseScale.x} ${this.baseScale.y} ${this.baseScale.z}`,
                dur: 1000,
                easing: 'easeOutElastic',
                delay: this.data.delay
              });
            });
          }
        }
      });

      AFRAME.registerComponent('pop-up', {
        schema: { delay: { type: 'number', default: 0 } },
        init: function () {
          const target = this.el.closest('[mindar-image-target]');
          if (target) {
            target.addEventListener('targetFound', () => {
              this.el.setAttribute('animation', {
                property: 'rotation',
                from: `-90 0 0`,
                to: `0 0 0`,
                dur: 1000,
                easing: 'easeOutElastic',
                delay: this.data.delay
              });
            });
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="backdrop-png" src="./Backdrop.png" />
        <img id="ground-png" src="./Ground.png" />
        <img id="booth-png" src="./Booth.png" />
        <img id="stand-png" src="./Stand.png" />
        <img id="robot-png" src="./Robot.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image scale-in="delay: 0" src="#backdrop-png" position="0 0 -0.3" height="1.2" width="1.2" material="transparent: true; alphaTest: 0.5"></a-image>
        <a-image scale-in="delay: 150" src="#ground-png" position="0 -0.6 0.3" rotation="-90 0 0" height="1.2" width="1.2" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-entity pop-up="delay: 400" position="0 -0.6 -0.15">
          <a-image src="#booth-png" position="0 0.4 0" height="1.2" width="1.5" material="transparent: true; alphaTest: 0.5"></a-image>
        </a-entity>

        <a-entity pop-up="delay: 650" position="0 -0.6 0.1">
          <a-image src="#stand-png" position="0 0.2 0" height="0.7" width="1" material="transparent: true; alphaTest: 0.5"></a-image>
        </a-entity>

        <a-entity pop-up="delay: 900" position="-0.35 -0.6 0.35">
          <a-image src="#robot-png" position="0 0.35 0" height="0.7" width="0.7" material="transparent: true; alphaTest: 0.5"></a-image>
        </a-entity>

        <a-entity pop-up="delay: 1150" position="0.25 -0.6 0.5">
          <a-image center-popup position="0 0.5 0" height="0.7" width="0.55" material="transparent: true; alphaTest: 0.5"></a-image>
        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
