<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const userFaceUrl = urlParams.get('face');

      AFRAME.registerComponent('dynamic-face', {
        init: function () {
          if (userFaceUrl) {
            this.el.setAttribute('crossOrigin', 'anonymous');
            this.el.setAttribute('src', userFaceUrl);
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="floating-model" src="./FastRun.glb"></a-asset-item>
        <a-asset-item id="road-model" src="./Road.glb"></a-asset-item>
        
        <img id="tree-png" src="./tree.png" />
        <img id="bush-png" src="./bush.png" />
        <img id="flowers-png" src="./flowers.png" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-image src="#tree-png" position="-0.6 0.1 -0.1" height="0.7" width="0.56" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-plane dynamic-face position="0 0 0" height="1.25" width="1"></a-plane>

        <a-image src="#bush-png" position="0.6 -0.2 0.2" height="0.35" width="0.35" material="transparent: true; alphaTest: 0.5"></a-image>

        <a-gltf-model src="#road-model" position="0.2 -0.45 0.5" scale="0.07 0.07 0.07" rotation="0 -45 0"></a-gltf-model>
        <a-gltf-model src="#floating-model" position="0.2 -0.4 0.5" scale="0.07 0.07 0.07" rotation="0 -45 0" animation-mixer="clip: mixamo.com.001; loop: repeat;"></a-gltf-model>

        <a-image src="#flowers-png" position="-0.3 -0.5 0.7" height="0.28" width="0.28" material="transparent: true; alphaTest: 0.5"></a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
